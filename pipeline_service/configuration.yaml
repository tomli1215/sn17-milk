# API settings
api:
  api_title: "3D Generation Pipeline Service"
  host: "0.0.0.0"
  port: 10006
  debug: false
  timeout: 300.0
  dynamic_params: false

# Output settings
output:
  save_generated_files: false
  send_generated_files: false
  compression: false
  output_dir: "generated_outputs"


# Trellis model settings
trellis:
  model_id: "microsoft/TRELLIS.2-4B"
  # Defaults when a pipeline_profiles entry omits a field:
  # sparse_structure_steps: 16
  # sparse_structure_cfg_strength: 6.0
  # shape_slat_steps: 8
  # shape_slat_cfg_strength: 3.0
  # tex_slat_steps: 12
  # tex_slat_cfg_strength: 9.5
  # Overrides per pipeline_type (keys: "512", "1024", "1024_cascade", "1536_cascade"):
  # sampler fields, optional num_candidates for that type, optional max_num_tokens.
  # Missing key uses flat fields only; 1024_cascade/1536_cascade fall back to "1024" profile if present.
  pipeline_profiles:
    "512":
      num_candidates: 3
      sparse_structure_steps: 16
      sparse_structure_cfg_strength: 6.0
      shape_slat_steps: 12
      shape_slat_cfg_strength: 3.0
      tex_slat_steps: 20
      tex_slat_cfg_strength: 5.0
    "1024_cascade":
      num_candidates: 2
      sparse_structure_steps: 16
      sparse_structure_cfg_strength: 6.0
      shape_slat_steps: 8
      shape_slat_cfg_strength: 3.0
      tex_slat_steps: 12
      tex_slat_cfg_strength: 9.5
  pipeline_type: "1024_cascade"  # default before VLM routing when pipeline_route_via_vllm is on
  mode: "stochastic"  # "stochastic", "multidiffusion"
  multiview: false
  # Default num_candidates when a pipeline_profiles entry does not set num_candidates (e.g. "1024"-only profile).
  num_candidates: 2
  # If > 0 and time from pipeline start to end of Trellis texturing exceeds this (seconds),
  # only the first 2 mesh candidates are converted to GLB (and sent to judge); otherwise use num_candidates.
  texturing_time_limit_seconds: 40
  offload_decoders: true  # Move decoders/flow models to CPU after use to free VRAM for CuMesh
  gpu: 0
  # VLM 512/1024 routing: modules/preprocessing/trellis_params_resolve.py (+ vllm_trellis_pipeline_router).
  pipeline_route_via_vllm: true
  # pipeline_route_vllm_url: "http://localhost:8095/v1"  # default: judge.vllm_url
  # pipeline_route_vllm_model: "..."  # default: judge.vllm_model_name
  pipeline_route_vllm_timeout: 10.0
  pipeline_route_vllm_max_image_side: 768

# Qwen model settings
qwen:
  base_model_path: "Qwen-Image-Edit-2511-Lightning-4steps-V1.0-bf16.safetensors"
  model_path: "Qwen/Qwen-Image-Edit-2511"
  lora_path: "lightx2v/Qwen-Image-Edit-2511-Lightning"
  lora_angles_path: ""
  lora_angles_filename: ""
  height: 1024
  width: 1024
  num_inference_steps: 4
  true_cfg_scale: 1.0
  prompt_path_base: "prompts/qwen_edit_prompt_v2.json"
  gpu: 0
  dtype: "bf16"
  

# Background removal model settings (model_type: ben2 | birefnet — must match model_id family)
background_removal:
  model_id: "ZhengPeng7/BiRefNet"
  model_type: birefnet
  gpu: 0
  params:
    input_image_size: [1024, 1024]
    padding_percentage: 0.05
    limit_padding: false

# GLB Converter settings (v1.0 implementation)
glb_converter:
  decimation_target: 250000
  texture_size: 2048
  alpha_mode: "OPAQUE"
  rescale: 1.0
  subdivisions: 1
  vertex_reproject: 0.1
  alpha_gamma: 2.0
  remesh: true
  remesh_band: 1
  remesh_project: 0.1
  mesh_cluster_global_iterations: 2
  mesh_cluster_refine_iterations: 0
  mesh_cluster_smooth_strength: 0.15
  mesh_cluster_threshold_cone_half_angle: 120
  smooth_mesh: true
  smooth_iterations: 5
  smooth_lambda: 0.5
  gpu: 0

# VLLM Judge settings
judge:
  vllm_url: "http://localhost:8095/v1"
  vllm_api_key: "local"
  vllm_model_name: "THUDM/GLM-4.1V-9B-Thinking"
  enabled: true
  # Qwen: generate multiple edits (seeds base, base+1, …) and pick best identity match via vLLM (v1.2 parity).
  qwen_edit_candidate_count: 3
  pick_best_qwen_edit_via_vllm: true

# Model versions (pinned HuggingFace model revisions)
model_versions:
  models:
    "microsoft/TRELLIS.2-4B": "af44b45f2e35a493886929c6d786e563ec68364d"
    "microsoft/TRELLIS-image-large": "25e0d31ffbebe4b5a97464dd851910efc3002d96"
    "ZhengPeng7/BiRefNet": "26e7919b869d089e5096e898c0492898f935604c"
    "ZhengPeng7/BiRefNet_dynamic": "6b6dad160e17b58bfc476c26e1d13827c910eed6"
    "PramaLLC/BEN2": "e48a20765fb421d19dcdb0bf3cc61e802ca5ec8f"
    "gray-apple/dino3": "31f2e9c01080ebe667542d4edc49ce670b0cf499"
    "Qwen/Qwen-Image-Edit-2511": "6f3ccc0b56e431dc6a0c2b2039706d7d26f22cb9"
